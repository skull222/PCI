<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUERTA DEL CIELO INTERNACIONAL</title>
    <link rel="stylesheet" href="Formulario.css">
    <link rel="icon" href="imagenes/Logo.png" type="image/png">
</head>
<body>

    <img src="/imagenes/Puerta.svg" alt="Logo">
    <p>¡DEJANOS TUS DATOS PARA PONERNOS EN CONTACTO CONTIGO!</p>

    <form id="miFormulario">
        <div class="form_input">
            <label for="nombre">Nombres y Apellidos</label>
            <input type="text" id="nombre" required>
        </div>
        <div class="form_input">
            <label for="edad">Edad</label>
            <input type="number" id="edad" min="9" max="100" required>
        </div>
        <div class="form_input">
            <label for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" required>
        </div>
        <div class="form_input">
            <label for="direccion">Dirección</label>
            <input type="text" id="direccion" required>
        </div>
        <div class="form_input">
            <label for="telefono">Teléfono de Contacto</label>
            <input type="tel" id="telefono" name="Telefono"" required />

        </div>
        <div class="form_input">
            <label for="correo">E-mail</label>
            <input type="email" id="correo" required>
        </div>
        <div class="form_input">
            <label for="recibir_celula">¿Deseas recibir la célula en tu propia casa?</label>
            <input type="text" id="recibir_celula" required>
        </div>
        <div class="form_input">
            <label for="tiempo_asistencia">¿Desde hace cuánto tiempo asistes a nuestras reuniones?</label>
            <input type="text" id="tiempo_asistencia" required>
        </div>
        <div class="form_input">
            <label for="como_nos_conocio">¿Cómo conociste nuestras reuniones?</label>
            <input type="text" id="como_nos_conocio" required>
        </div>
        <div class="form_input">
            <label for="oracion">Escribe brevemente una petición por la que quieres que oremos:</label>
            <textarea rows="2" id="oracion"></textarea>
        </div>
        <div>
            <button ype="submit" id="botonEnviar" class="button-74" disabled>
                ENVIAR
            </button>
            
        </div>
    </form>
</body>
</html>
